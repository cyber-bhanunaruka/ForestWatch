<section id="hero" class="hero">
    <div class="hero__bg"></div>
    <div class="hero__grid"></div>

    <div :class="['hero__content', { visible }]">
      <div class="hero__eyebrow">
        <span class="hero__dot"></span>
        {{ t.eyebrow }}
      </div>

      <h1 class="hero__title">
        {{ t.title }}<br/>
        <span class="hero__title--accent">{{ t.titleAccent }}</span>
      </h1>

      <p class="hero__subtitle">{{ t.subtitle }}</p>

      <div class="hero__meta">
        <div v-for="item in t.meta" :key="item.label" class="hero__meta-item">
          <span class="hero__meta-label">{{ item.label }}</span>
          <span class="hero__meta-value">{{ item.value }}</span>
        </div>
      </div>

      <div class="hero__cta-row">
        <button class="hero__cta" @click="scrollToSection">
          {{ t.ctaPrimary }}
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 3v10m0 0l4-4m-4 4L4 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="hero__cta hero__cta--ghost" @click="scrollToSection('dashboard')">
          {{ t.ctaSecondary }}
        </button>
      </div>
    </div>

    <div class="hero__scroll-hint">
      <div class="hero__scroll-line"></div>
    </div>
  </section>
